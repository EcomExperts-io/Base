name: AI Error Injection

on:
  push:
    branches:
      - '**'

permissions:
  contents: write
  pull-requests: write

jobs:
  inject-errors:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-ai]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get changed JS files
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- '*.js' | grep -v '\.min\.js$' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          if [ -z "$FILES" ]; then
            echo "has_js=false" >> $GITHUB_OUTPUT
          else
            echo "has_js=true" >> $GITHUB_OUTPUT
          fi

      - name: Install OpenAI SDK
        if: steps.changed.outputs.has_js == 'true'
        run: npm install openai

      - name: Run AI Error Injection
        if: steps.changed.outputs.has_js == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: node .github/scripts/ai-error-injection.mjs

      - name: Check for changes
        if: steps.changed.outputs.has_js == 'true'
        id: changes
        run: |
          git diff --quiet && echo "has_changes=false" >> $GITHUB_OUTPUT || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Create PR with suggestions
        if: steps.changed.outputs.has_js == 'true' && steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="ai/error-injection-$(date +%Y%m%d-%H%M%S)"
          git config user.name "AI Error Injection Bot"
          git config user.email "ai-bot@github-actions"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "[skip-ai] Add console.error instrumentation for error monitoring"
          git push origin "$BRANCH"
          gh pr create \
            --base "${{ github.ref_name }}" \
            --title "AI: Add error instrumentation to JS files" \
            --body "$(cat <<'PREOF'
          ## Automated Error Instrumentation

          This PR was generated by the **AI Error Injection** workflow.

          ### What changed
          - Added `try/catch` blocks around risky operations (fetch calls, JSON parsing)
          - Added `console.error()` with stack traces inside empty or generic catch blocks
          - Added `.catch()` handlers to unhandled promises
          - Ensured full error objects are passed so `.stack` is captured

          ### What to review
          - Verify the added error handling doesn't change business logic
          - Check that no duplicate `console.error` calls were introduced

          ### How to test
          1. Check out this branch
          2. Run the theme locally
          3. Trigger error scenarios and verify console output

          ---
          *Auto-generated. Commits with `[skip-ai]` are ignored.*
          PREOF
          )"
